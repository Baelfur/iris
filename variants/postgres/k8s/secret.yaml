apiVersion: v1
kind: Secret
metadata:
  name: inventory-api-secret
type: Opaque
stringData:
  # Per-variant database connection.
  PG_HOST: "REPLACE_ME"
  PG_PORT: "5432"
  PG_USER: "REPLACE_ME"
  PG_PASSWORD: "REPLACE_ME"
  PG_DATABASE: "REPLACE_ME"

  # Required settings (#261, #98).
  # CONFIG__SOURCE: where validation/ and queries/ YAMLs come from.
  #   - "local" reads from the image's working directory
  #   - "git"   pulls from a config repo (needs CONFIG__GIT_URL)
  #   - "db"    reads from a Postgres config server (needs CONFIG__DB_DSN)
  CONFIG__SOURCE: "local"
  # AUTH__MODE: user-facing auth posture. No default — operators must declare.
  #   - "gateway" trusts an upstream gateway / mesh that validated identity
  #   - "jwt"     validates JWTs in-process against AUTH__JWKS_URL
  #   - "open"    accepts any caller (dev only — startup logs a WARNING)
  AUTH__MODE: "gateway"

  # Surface narrowing (optional). Drop an allowlist.yaml at the config root
  # with `schemas:` and/or `tables:` to narrow the DDL cache further than the
  # service account's grants already do. (#269)
  # ALLOWLIST__MODE: "enforce"      # default; allowlist is a security boundary
  # ALLOWLIST__MODE: "presentation" # spec-only filter; full DDL stays reachable

  # OpenAPI exposure (optional). Default "enabled" leaves /docs and
  # /openapi.json unauthenticated; flip to "admin-enabled" (token-gated)
  # or "disabled" (404 all three) for closed-network deployments. (#302)
  # OPENAPI__VISIBILITY: "admin-enabled"

  # Admin lane (optional). When set, gates /admin/* on X-Admin-Token. Pair
  # with AUTH__ADMIN_GROUP + AUTH__JWKS_URL for the hybrid JWT-admin path. (#303)
  # AUTH__ADMIN_TOKEN: "REPLACE_ME_LONG_RANDOM"

  # Page-size cap (optional). Default 10000; set 0 for explicit unbounded.
  # MAX_PAGE_SIZE: "1000"
