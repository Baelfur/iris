name: Lint

# Static analysis — ruff (fast linter + formatter) and mypy (type
# checker). Runs on every push/PR to dev or main. Fast enough to be
# a required check; failures block merges via branch protection.

on:
  push:
    branches: [main, dev]
    paths:
      - '**/*.py'
      - 'core/pyproject.toml'
      - '.github/workflows/lint.yml'
      - 'docs/**/*.md'
      - 'docs/**/*.md.tmpl'
      - 'docs/_config.yml'
      - 'docs/build.py'
      - 'README.md'
  pull_request:
    branches: [main, dev]
    paths:
      - '**/*.py'
      - 'core/pyproject.toml'
      - '.github/workflows/lint.yml'
      - 'docs/**/*.md'
      - 'docs/**/*.md.tmpl'
      - 'docs/_config.yml'
      - 'docs/build.py'
      - 'README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: core/pyproject.toml

      - name: Install lint extras
        run: pip install -e './core[lint]'

      - name: ruff check
        run: ruff check core/core variants

      - name: ruff format --check
        run: ruff format --check core/core variants

      - name: mypy
        # Scope is core (per pyproject [tool.mypy] config).
        # Variants will join the scope incrementally once core
        # is clean.
        run: cd core && mypy

      - name: docs drift check
        # Renders every docs/**/*.md.tmpl from docs/_config.yml and
        # fails if the result differs from the committed docs/**/*.md.
        # See docs/build.py docstring docstring.
        run: python docs/build.py --check

      - name: docstring coverage (interrogate)
        # Threshold + exclusions configured under [tool.interrogate]
        # in core/pyproject.toml. Gate set at 80%; gap is filled
        # opportunistically when modules are touched.
        run: interrogate -c core/pyproject.toml core/core
